<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#gradient1)" stroke="#ec4899" stroke-width="3"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fce7f3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Crown Icon (VIP Symbol) -->
  <path d="M100 45 L110 70 L135 65 L120 85 L140 95 L110 95 L100 120 L90 95 L60 95 L80 85 L65 65 L90 70 Z" 
        fill="#fbbf24" stroke="#ffffff" stroke-width="2"/>
  
  <!-- Lotus Flower (Elegance Symbol) -->
  <g transform="translate(100, 110)">
    <ellipse cx="0" cy="0" rx="35" ry="15" fill="#fce7f3" opacity="0.8"/>
    <path d="M -20 -5 Q -15 -15, 0 -10 Q 15 -15, 20 -5" fill="#ffffff" opacity="0.9"/>
    <path d="M -15 0 Q -10 -10, 0 -5 Q 10 -10, 15 0" fill="#ffffff" opacity="0.9"/>
    <path d="M -10 5 Q -5 -5, 0 0 Q 5 -5, 10 5" fill="#ffffff" opacity="0.9"/>
  </g>
  
  <!-- Letter "E" Stylized -->
  <text x="100" y="165" font-family="'Playfair Display', serif" font-size="48" font-weight="bold" 
        text-anchor="middle" fill="url(#textGradient)" stroke="#ffffff" stroke-width="1">E</text>
  
  <!-- Decorative Elements -->
  <circle cx="40" cy="60" r="3" fill="#fbbf24" opacity="0.6"/>
  <circle cx="160" cy="60" r="3" fill="#fbbf24" opacity="0.6"/>
  <circle cx="40" cy="140" r="3" fill="#fbbf24" opacity="0.6"/>
  <circle cx="160" cy="140" r="3" fill="#fbbf24" opacity="0.6"/>
  
  <!-- Border Ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#fce7f3" stroke-width="1" opacity="0.3"/>
</svg>
